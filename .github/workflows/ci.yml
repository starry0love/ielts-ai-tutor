name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    name: Basic checks
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Check desktop scripts
        run: |
          node --check apps\desktop\src\api.js
          node --check apps\desktop\electron\main.cjs

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        working-directory: backend
        run: python -m pip install -r requirements.txt

      - name: Check backend modules
        run: python -m compileall -q backend\app backend\smoke_test.py backend\integration_test.py

      - name: Run backend smoke test
        run: python backend\smoke_test.py
